<!--
  Diurn — "Magic Link" email template, used for the 6-digit sign-in code.
  Paste into Supabase → Authentication → Email Templates → Magic Link
  → Message body (HTML). Uses the {{ .Token }} variable (the 6-digit code).
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0"
  style="margin:0;padding:32px 12px;background:#faf6ee;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
        style="max-width:480px;background:#fffdf8;border:1px solid #e8dfc9;border-radius:16px;">
        <tr>
          <td align="center" style="padding:40px 40px 24px;text-align:center;">
            <h1 style="margin:0 0 14px;font-family:Georgia,'Times New Roman',serif;font-weight:normal;font-style:italic;font-size:26px;color:#2b251b;">
              Sign in to <span style="font-size:32px;">Diurn</span>
            </h1>
            <p style="margin:0 0 22px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.7;color:#6e6553;">
              Enter the code below to continue.
            </p>
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center"
                  style="background:#f3e9d2;border:1px solid #e8dfc9;border-radius:12px;padding:20px 0;text-align:center;">
                  <span style="font-family:'Courier New',Courier,monospace;font-size:34px;font-weight:bold;letter-spacing:10px;color:#2b251b;padding-left:10px;">{{ .Token }}</span>
                </td>
              </tr>
            </table>
            <p style="margin:22px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:1.6;color:#a49879;">
              This code expires shortly and can be used once. If you didn&rsquo;t
              request it, you can safely ignore this email.
            </p>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding:24px 40px 36px;text-align:center;">
            <div style="border-top:1px solid #f1ebdc;margin:0 0 16px;"></div>
            <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.6;color:#a49879;">
              Never share this code with anyone. Diurn will never ask you for it.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
